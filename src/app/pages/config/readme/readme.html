<div class="h-full flex flex-col bg-gray-50 dark:bg-gray-900">
  <!-- Header -->
  <div
    class="border-b border-gray-200 dark:border-gray-700 p-4 flex items-center"
  >
    <lucide-icon
      [img]="FileTextIcon"
      size="20"
      class="text-gray-500 mr-3"
    ></lucide-icon>
    <div>
      <h1 class="text-lg font-semibold text-gray-900 dark:text-white">
        README.md
      </h1>
      <p class="text-sm text-gray-600 dark:text-gray-400">
        Project documentation and setup guide
      </p>
    </div>
  </div>

  <div class="flex-1 overflow-hidden flex">
    <!-- Markdown Content -->
    <div class="flex-1 flex flex-col">
      <div class="border-b border-gray-200 dark:border-gray-700 p-2">
        <span class="text-sm font-mono text-gray-600 dark:text-gray-400"
          >Markdown Preview</span
        >
      </div>
      <div class="flex-1 overflow-auto">
        <div class="p-6 prose prose-gray dark:prose-invert max-w-none">
          <pre
            class="whitespace-pre-wrap text-sm text-gray-800 dark:text-gray-200"
          >{{ readmeContent }}</pre>
        </div>
      </div>
    </div>

    <!-- Project Info -->
    <div class="w-80 border-l border-gray-200 dark:border-gray-700 flex flex-col">
      <div class="border-b border-gray-200 dark:border-gray-700 p-2">
        <span class="text-sm font-mono text-gray-600 dark:text-gray-400"
          >Project Info</span
        >
      </div>
      <div class="flex-1 overflow-auto p-4 space-y-3">
        <div
          *ngFor="let info of projectInfo"
          class="bg-white dark:bg-gray-800 rounded-lg p-3 shadow-sm"
        >
          <div class="flex items-center justify-between">
            <div class="flex items-center">
              <lucide-icon
                [img]="StarIcon"
                size="14"
                class="text-yellow-500 mr-2"
              ></lucide-icon>
              <span class="text-sm font-medium text-gray-900 dark:text-white">
                {{ info.label }}
              </span>
            </div>
            <span class="text-sm text-gray-600 dark:text-gray-400">
              {{ info.value }}
            </span>
          </div>
        </div>

        <!-- Quick Actions -->
        <div class="mt-6 p-3 bg-blue-50 dark:bg-blue-900 rounded-lg">
          <div class="flex items-center mb-3">
            <lucide-icon
              [img]="InfoIcon"
              size="16"
              class="text-blue-500 mr-2"
            ></lucide-icon>
            <span class="text-sm font-semibold text-blue-900 dark:text-blue-100"
              >Quick Commands</span
            >
          </div>
          <div class="space-y-2 text-xs text-blue-700 dark:text-blue-200">
            <div class="font-mono bg-blue-100 dark:bg-blue-800 p-2 rounded">
              ng serve
            </div>
            <div class="font-mono bg-blue-100 dark:bg-blue-800 p-2 rounded">
              ng build
            </div>
            <div class="font-mono bg-blue-100 dark:bg-blue-800 p-2 rounded">
              ng test
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
