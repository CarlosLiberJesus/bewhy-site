<div class="h-full flex flex-col">
  <!-- Header -->
  <div
    class="border-b p-4 flex items-center"
    [ngClass]="isDarkTheme ? 'border-gray-800' : 'border-gray-200'"
  >
    <lucide-icon
      [img]="LinkIcon"
      size="20"
      class="text-purple-500 mr-3"
    ></lucide-icon>
    <div>
      <h1
        class="text-lg font-semibold"
        [ngClass]="isDarkTheme ? 'text-gray-200' : 'text-gray-700'"
      >
        Moodle LangChain Agent
      </h1>
      <p class="text-sm text-gray-400">
        LangChain que recebe a pergunta da WebApp, e com o uso das tools,
        contacta o Moodle Moodle MCP Server
      </p>
    </div>
  </div>

  <div class="flex-1 overflow-hidden flex">
    <!-- Code Editor Section -->
    <div class="flex-1 flex flex-col">
      <div
        class="border-b p-2"
        [ngClass]="isDarkTheme ? 'border-gray-800' : 'border-gray-200'"
      >
        <span class="text-sm font-mono text-gray-400">Code Editor</span>
      </div>
      <div class="flex-1 overflow-auto">
        <pre
          class="p-4 text-sm font-mono whitespace-pre-wrap"
          [ngClass]="isDarkTheme ? 'text-gray-200' : 'text-gray-700'"
        ><code>{{ codeExample }}</code></pre>
      </div>
    </div>

    <!-- Features Section -->
    <div
      class="w-80 border-l flex flex-col"
      [ngClass]="isDarkTheme ? 'border-gray-800' : 'border-gray-200'"
    >
      <div
        class="border-b p-2"
        [ngClass]="isDarkTheme ? 'border-gray-800' : 'border-gray-200'"
      >
        <span class="text-sm font-mono text-gray-400">Features</span>
      </div>
      <div class="flex-1 overflow-auto p-4 space-y-4">
        <div
          *ngFor="let feature of features"
          class="rounded-lg p-4 shadow-sm feature-card"
          [ngClass]="isDarkTheme ? 'bg-gray-800' : 'bg-gray-200'"
        >
          <div class="flex items-center mb-2">
            <lucide-icon
              [img]="feature.icon === 'LinkIcon' ? LinkIcon : feature.icon === 'DatabaseIcon' ? DatabaseIcon : ZapIcon"
              size="16"
              class="text-purple-500 mr-2"
            ></lucide-icon>
            <h3
              class="text-sm font-semibold"
              [ngClass]="isDarkTheme ? 'text-gray-200' : 'text-gray-700'"
            >
              {{ feature.title }}
            </h3>
          </div>
          <p
            class="text-xs"
            [ngClass]="isDarkTheme ? 'text-gray-200' : 'text-gray-700'"
          >
            {{ feature.description }}
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
