<div class="h-full flex flex-col bg-gray-50 dark:bg-gray-900">
  <!-- Header -->
  <div
    class="border-b border-gray-200 dark:border-gray-700 p-4 flex items-center"
  >
    <lucide-icon
      [img]="MessageCircleIcon"
      size="20"
      class="text-blue-500 mr-3"
    ></lucide-icon>
    <div>
      <h1 class="text-lg font-semibold text-gray-900 dark:text-white">
        MoodleChat.py
      </h1>
      <p class="text-sm text-gray-600 dark:text-gray-400">
        Moodle messaging integration component
      </p>
    </div>
  </div>

  <div class="flex-1 overflow-hidden flex">
    <!-- Code Editor Section -->
    <div class="flex-1 flex flex-col">
      <div class="border-b border-gray-200 dark:border-gray-700 p-2">
        <span class="text-sm font-mono text-gray-600 dark:text-gray-400"
          >Code Editor</span
        >
      </div>
      <div class="flex-1 overflow-auto">
        <pre
          class="p-4 text-sm font-mono text-gray-800 dark:text-gray-200 whitespace-pre-wrap"
        ><code>{{ codeExample }}</code></pre>
      </div>
    </div>

    <!-- Chat Preview Section -->
    <div
      class="w-80 border-l border-gray-200 dark:border-gray-700 flex flex-col"
    >
      <div class="border-b border-gray-200 dark:border-gray-700 p-2">
        <span class="text-sm font-mono text-gray-600 dark:text-gray-400"
          >Chat Preview</span
        >
      </div>
      <div class="flex-1 overflow-auto p-4 space-y-3">
        <div
          *ngFor="let message of chatMessages"
          class="flex items-start space-x-2"
        >
          <div class="flex-shrink-0">
            <lucide-icon
              [img]="message.type === 'bot' ? BotIcon : UserIcon"
              size="16"
              [class]="
                message.type === 'bot'
                  ? 'text-blue-500'
                  : message.type === 'user'
                    ? 'text-green-500'
                    : 'text-gray-500'
              "
            ></lucide-icon>
          </div>
          <div class="flex-1">
            <div
              class="text-xs text-gray-500 dark:text-gray-400 mb-1 capitalize"
            >
              {{ message.type }}
            </div>
            <div
              class="text-sm text-gray-800 dark:text-gray-200 bg-white dark:bg-gray-800 rounded-lg p-2 shadow-sm"
            >
              {{ message.content }}
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
