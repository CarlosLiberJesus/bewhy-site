<div class="h-full flex flex-col">
  <!-- Header -->
  <div
    [ngClass]="isDarkTheme ? 'border-gray-800' : 'border-gray-200'"
    class="border-b p-4 flex items-center"
  >
    <lucide-icon
      [img]="MessageCircleIcon"
      size="20"
      class="text-green-400 mr-3"
    ></lucide-icon>
    <div>
      <h1
        class="text-lg font-semibold"
        [ngClass]="isDarkTheme ? 'text-gray-200' : 'text-gray-700'"
      >
        Moodle WebApp Chat
      </h1>
      <p class="text-sm text-gray-400">Interaja num chat com o Moodle</p>
    </div>
  </div>

  <app-moodle-agent [page]="'chat'"></app-moodle-agent>

  <div class="flex-1 overflow-hidden flex">
    <!-- Code Editor Section -->
    <div class="flex-1 flex flex-col">
      <div
        class="border-b p-2"
        [ngClass]="isDarkTheme ? 'border-gray-800' : 'border-gray-200'"
      >
        <span class="text-sm font-mono text-gray-400">Code Editor</span>
      </div>
      <div class="flex-1 overflow-auto">
        <pre
          class="p-4 text-sm font-mono whitespace-pre-wrap"
          [ngClass]="isDarkTheme ? 'text-gray-200' : 'text-gray-700'"
        ><code>{{ codeExample }}</code></pre>
      </div>
    </div>

    <!-- Chat Preview Section -->
    <div
      class="w-80 border-l flex flex-col"
      [ngClass]="isDarkTheme ? 'border-gray-800' : 'border-gray-200'"
    >
      <div
        class="border-b p-2"
        [ngClass]="isDarkTheme ? 'border-gray-800' : 'border-gray-200'"
      >
        <span class="text-sm font-mono text-gray-400">Chat Preview</span>
      </div>
      <div class="flex-1 overflow-auto p-4 space-y-3">
        <div
          *ngFor="let message of chatMessages"
          class="flex items-start space-x-2 p-2"
          [ngClass]="isDarkTheme ? 'bg-gray-800' : 'bg-gray-200'"
        >
          <div class="flex-shrink-0">
            <lucide-icon
              [img]="message.type === 'bot' ? BotIcon : UserIcon"
              size="16"
              [class]="
                message.type === 'bot'
                  ? 'text-blue-500'
                  : message.type === 'user'
                    ? 'text-green-500'
                    : 'text-gray-500'
              "
            ></lucide-icon>
          </div>
          <div class="flex-1">
            <div class="text-xs text-gray-400 mb-1 capitalize">
              {{ message.type }}
            </div>
            <div
              class="text-sm rounded-lg p-2 shadow-sm"
              [ngClass]="isDarkTheme ? 'text-gray-200' : 'text-gray-700'"
            >
              {{ message.content }}
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
