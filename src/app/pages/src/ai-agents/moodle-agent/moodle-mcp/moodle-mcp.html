<div class="h-full flex flex-col bg-gray-50 dark:bg-gray-900">
  <!-- Header -->
  <div
    class="border-b border-gray-200 dark:border-gray-700 p-4 flex items-center"
  >
    <lucide-icon
      [img]="ServerIcon"
      size="20"
      class="text-orange-500 mr-3"
    ></lucide-icon>
    <div>
      <h1 class="text-lg font-semibold text-gray-900 dark:text-white">
        MoodleMcp.py
      </h1>
      <p class="text-sm text-gray-600 dark:text-gray-400">
        Model Context Protocol integration for Moodle
      </p>
    </div>
  </div>

  <div class="flex-1 overflow-hidden flex">
    <!-- Code Editor Section -->
    <div class="flex-1 flex flex-col">
      <div class="border-b border-gray-200 dark:border-gray-700 p-2">
        <span class="text-sm font-mono text-gray-600 dark:text-gray-400"
          >Code Editor</span
        >
      </div>
      <div class="flex-1 overflow-auto">
        <pre
          class="p-4 text-sm font-mono text-gray-800 dark:text-gray-200 whitespace-pre-wrap"
        ><code>{{ codeExample }}</code></pre>
      </div>
    </div>

    <!-- MCP Status Section -->
    <div
      class="w-80 border-l border-gray-200 dark:border-gray-700 flex flex-col"
    >
      <div class="border-b border-gray-200 dark:border-gray-700 p-2">
        <span class="text-sm font-mono text-gray-600 dark:text-gray-400"
          >MCP Status</span
        >
      </div>
      <div class="flex-1 overflow-auto p-4 space-y-3">
        <div
          *ngFor="let feature of mcpFeatures"
          class="bg-white dark:bg-gray-800 rounded-lg p-3 shadow-sm"
        >
          <div class="flex items-center justify-between mb-2">
            <h3 class="text-sm font-semibold text-gray-900 dark:text-white">
              {{ feature.title }}
            </h3>
            <span
              class="px-2 py-1 text-xs rounded-full"
              [class]="
                feature.status === 'active'
                  ? 'bg-green-100 text-green-800 dark:bg-green-900 dark:text-green-200'
                  : 'bg-yellow-100 text-yellow-800 dark:bg-yellow-900 dark:text-yellow-200'
              "
            >
              {{ feature.status }}
            </span>
          </div>
          <p class="text-xs text-gray-600 dark:text-gray-400">
            {{ feature.description }}
          </p>
        </div>

        <!-- Connection Status -->
        <div class="mt-6 p-3 bg-blue-50 dark:bg-blue-900 rounded-lg">
          <div class="flex items-center mb-2">
            <lucide-icon
              [img]="ShieldIcon"
              size="16"
              class="text-blue-500 mr-2"
            ></lucide-icon>
            <span class="text-sm font-semibold text-blue-900 dark:text-blue-100"
              >Connection Status</span
            >
          </div>
          <p class="text-xs text-blue-700 dark:text-blue-200">
            MCP Server: Connected<br />
            Moodle API: Authenticated<br />
            Tools Available: 12
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
