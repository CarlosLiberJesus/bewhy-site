<div class="flex-1 overflow-hidden">
  <div class="h-full overflow-auto">
    <div class="pt-3">
      <div class="text-center px-8 py-4">
        <div class="mb-4">
          <lucide-icon
            [img]="AlertTriangleIcon"
            size="64"
            class="text-yellow-500 mx-auto mb-4"
          ></lucide-icon>
          <h1 [class]="getHighContrast('text-4xl font-bold mb-2')">404</h1>
          <h2 [class]="getContrast('text-xl')">File Not Found</h2>
        </div>
      </div>
      <div
        class="flex items-center text-center justify-center h-full px-10 pb-6"
      >
        <p [class]="getHighContrast('text-lg px-10')">
          O recurso pedido não foi encontrado. Por favor, verifique o caminho ou
          tente navegar para outra parte do projeto.
        </p>
      </div>
      <div class="space-y-3">
        <p [class]="getContrast('text-lg px-10 pt-5 text-center')">
          <a
            routerLink="/src/web-app/index-angular"
            class="inline-flex items-center px-4"
          >
            <lucide-icon [img]="HomeIcon" size="16" class="mr-2"></lucide-icon>
            Ir para o
            <span class="ml-2 text-yellow-500 hover:underline">Inicio</span>
          </a>
        </p>
        <p [class]="getContrast('text-lg px-10 text-center')">
          <a
            onclick="history.back()"
            tabindex="1"
            role="button"
            aria-label="Voltar Atrás"
            class="inline-flex items-center px-4 hover:cursor-pointer"
          >
            <lucide-icon
              [img]="ArrowLeftIcon"
              size="16"
              class="mr-2"
            ></lucide-icon>
            Voltar
            <span class="ml-2 text-yellow-500 hover:underline">Atrás</span>
          </a>
        </p>
      </div>
    </div>
  </div>
</div>
