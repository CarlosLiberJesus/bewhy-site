<div [class]="getFooterClasses()">
  <!-- Theme Switcher -->
  <button
    (click)="onThemeToggle()"
    [class]="getThemeButtonClasses()"
    [title]="isDarkTheme ? 'Alterar para Claro' : 'Alterar para Escuro'"
    tabindex="1"
    role="button"
    aria-label="Alterar tema"
    (keydown.enter)="onThemeToggle()"
    (keydown.space)="onThemeToggle()"
  >
    <lucide-icon
      [img]="isDarkTheme ? SunIcon : MoonIcon"
      size="18"
    ></lucide-icon>
  </button>

  <!-- Auth Avatar Placeholder -->
  <button [class]="getAvatarButtonClasses()" title="Perfil Utilizador">
    <lucide-icon [img]="UserIcon" size="18"></lucide-icon>
  </button>
</div>
